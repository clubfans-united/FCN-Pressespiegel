name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  phpcs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install

      - name: Run PHPCS
        run: vendor/bin/phpcs

  eslint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: ESLint
        run: npm run eslint

  build:
    runs-on: ubuntu-latest
    needs: [phpcs, eslint]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Composer Install
        run: composer install --no-dev --no-suggest --optimize-autoloader --no-interaction

      - name: Set Version in PHP File
        run: |
          sed -i "s/Version:.*$/Version: ${{ github.ref_name }}/" fcn-pressespiegel.php

      - name: Create plugin zip
        run: npm run plugin-zip

      - name: Copy zip with version suffix
        run: cp fcn-pressespiegel.zip fcn-pressespiegel-${{ github.ref_name }}.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: |
            fcn-pressespiegel.zip
            fcn-pressespiegel-${{ github.ref_name }}.zip

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build
        uses: actions/download-artifact@v8
        with:
          name: build

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}
          files: |
            fcn-pressespiegel.zip
            fcn-pressespiegel-${{ github.ref_name }}.zip
