name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  phpcs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer install

      - name: Run PHPCS
        run: vendor/bin/phpcs

  eslint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: ESLint
        run: npm run eslint

  build:
    runs-on: ubuntu-latest
    needs: [phpcs, eslint]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Composer Install
        run: composer install --no-dev --no-suggest --optimize-autoloader --no-interaction

      - name: Set Version in PHP File
        run: |
          sed -i "s/Version:.*$/Version: ${{ github.ref_name }}/" fcn-pressespiegel.php

      - name: Create plugin zip
        run: npm run plugin-zip

      - name: Copy zip with version suffix
        run: cp fcn-pressespiegel.zip fcn-pressespiegel-${{ github.ref_name }}.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            fcn-pressespiegel.zip
            fcn-pressespiegel-${{ github.ref_name }}.zip

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            Release ${{ github.ref }}

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: Upload Release Asset (versioned)
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./fcn-pressespiegel-${{ github.ref_name }}.zip
          asset_name: fcn-pressespiegel-${{ github.ref_name }}.zip
          asset_content_type: application/zip

      - name: Upload Release Asset (without version)
        id: upload-release-asset-without-version
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./fcn-pressespiegel.zip
          asset_name: fcn-pressespiegel.zip
          asset_content_type: application/zip
